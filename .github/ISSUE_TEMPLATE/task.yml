name: Task
description: Track a user-facing or system-level deliverable
title: "[Task] "
labels: ["task"]
body:
  - type: input
    id: summary
    attributes:
      label: Summary
      placeholder: Describe the task
    validations:
      required: true

  - type: textarea
    id: outcome
    attributes:
      label: Desired outcome
      placeholder: After implementation, what changes from before implementation to after?
    validations:
      required: true

  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      placeholder: |
        - [ ] ...
        - [ ] ...
    validations:
      required: true

  - type: textarea
    id: notes
    attributes:
      label: Notes
